<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>SMARTcart</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#121B26" media="(prefers-color-scheme: dark)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            // New Brand Colors
            'deep-blue': '#2C3E50',
            'teal-green': '#1ABC9C',
            'night-bg': '#121B26',
            'night-card': '#1C2A39',
            'light-gray-blue': '#E8EBED', // Updated from off-white for better contrast

            // Map Clinical to Teal Green (Primary Action)
            clinical: {
              50: '#f0fdfa',
              100: '#ccfbf1',
              500: '#1ABC9C', // Teal Green
              600: '#16A085', // Darker Teal (Hover)
              700: '#0f766e',
              900: '#134e4a',
            },
            alert: {
              50: '#fff7ed',
              100: '#ffedd5',
              500: '#f97316',
              600: '#ea580c',
            }
          },
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
            heading: ['Montserrat', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@400;600;700&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    /* Hide scrollbar for clean tablet look but allow scroll */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Shifting Gradient Aurora Animations - Viewport Relative & Hardware Accelerated */
    @keyframes animateBlob1 {
      0% { transform: translate(0px, 0px) scale(1) rotate(0deg); }
      33% { transform: translate(12vw, -8vh) scale(1.15) rotate(120deg); }
      66% { transform: translate(-8vw, 12vh) scale(0.9) rotate(240deg); }
      100% { transform: translate(0px, 0px) scale(1) rotate(360deg); }
    }
    @keyframes animateBlob2 {
      0% { transform: translate(0px, 0px) scale(1) rotate(0deg); }
      33% { transform: translate(-12vw, 10vh) scale(0.9) rotate(-120deg); }
      66% { transform: translate(8vw, -8vh) scale(1.15) rotate(-240deg); }
      100% { transform: translate(0px, 0px) scale(1) rotate(-360deg); }
    }
    @keyframes animateBlob3 {
      0% { transform: translate(0px, 0px) scale(1) rotate(0deg); }
      33% { transform: translate(8vw, 8vh) scale(0.95) rotate(90deg); }
      66% { transform: translate(-10vw, -10vh) scale(1.1) rotate(180deg); }
      100% { transform: translate(0px, 0px) scale(1) rotate(270deg); }
    }

    .animate-blob-1 {
      animation: animateBlob1 35s infinite ease-in-out;
      will-change: transform;
    }
    .animate-blob-2 {
      animation: animateBlob2 40s infinite ease-in-out;
      will-change: transform;
    }
    .animate-blob-3 {
      animation: animateBlob3 37s infinite ease-in-out;
      will-change: transform;
    }

    /* Medical Liquid Wave Animations */
    @keyframes waveMove {
      0% { transform: translateX(0) translateZ(0) scaleY(1); }
      50% { transform: translateX(-25%) translateZ(0) scaleY(0.85); }
      100% { transform: translateX(0) translateZ(0) scaleY(1); }
    }
    
    .animate-wave-slow {
      animation: waveMove 28s ease-in-out infinite;
      will-change: transform;
    }
    
    .animate-wave-fast {
      animation: waveMove 18s ease-in-out infinite;
      will-change: transform;
    }

    /* Premium Frosted Glassmorphism Cards */
    .glass-card {
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }
    
    .dark .glass-card {
      background: rgba(28, 42, 57, 0.45);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    /* Glow details - Only hover on mouse devices to prevent sticky hover states on tablets */
    .glow-hover {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    @media (hover: hover) {
      .glow-hover:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 20px -8px rgba(26, 188, 156, 0.3);
      }
    }
    .glow-hover:active {
      transform: scale(0.97);
    }

    /* Global Tablet & Touch Device Optimizations */
    button, .glass-card, [role="button"], input[type="submit"], select, .cursor-pointer {
      -webkit-tap-highlight-color: transparent !important;
      user-select: none !important;
      -webkit-user-select: none !important;
      touch-action: manipulation !important;
    }

    /* Subtle medical tech dot pattern - Seamless Dynamic Drift */
    @keyframes driftGrid {
      from { background-position: 0px 0px; }
      to { background-position: 24px 24px; }
    }

    .bg-grid-pattern {
      background-size: 24px 24px;
      background-image: radial-gradient(circle, rgba(26, 188, 156, 0.18) 1.2px, transparent 1.2px);
      animation: driftGrid 40s linear infinite;
      will-change: background-position;
    }
    
    .dark .bg-grid-pattern {
      background-size: 24px 24px;
      background-image: radial-gradient(circle, rgba(255, 255, 255, 0.1) 1.2px, transparent 1.2px);
      animation: driftGrid 40s linear infinite;
      will-change: background-position;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body class="bg-white dark:bg-night-bg text-deep-blue dark:text-slate-200 transition-colors duration-300 antialiased">

  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
